name: VST3-CI
on:
  push:
    branches: [ vst3 ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Python for fetch script
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install cmake

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y cmake --installargs 'ADD_CMAKE_TO_PATH=System'

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure Git
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI Bot"

      - name: Run fetch-deps (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -e
          if [ -f vst3/extras/fetch-deps.sh ]; then
            chmod +x vst3/extras/fetch-deps.sh
            vst3/extras/fetch-deps.sh
          else
            echo "No fetch-deps script found at vst3/extras/fetch-deps.sh"
          fi

      - name: Run fetch-deps (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Try to invoke the bash script via Git Bash if available; otherwise skip with notice.
          if (Get-Command bash -ErrorAction SilentlyContinue) {
            bash -lc "if [ -f vst3/extras/fetch-deps.sh ]; then vst3/extras/fetch-deps.sh; else echo 'No fetch-deps script found at vst3/extras/fetch-deps.sh'; fi"
          } else {
            Write-Host "bash not available on this runner; skipping fetch-deps"
          }

      - name: Configure CMake (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -e
          if [ -d vst3 ]; then
            cmake -S vst3 -B build -DCMAKE_BUILD_TYPE=Release
          else
            echo "Directory 'vst3' not found. Listing repo root for debugging:"
            ls -la
            exit 1
          fi

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path -Path vst3)) {
            Write-Error "Directory 'vst3' not found. Listing repo root for debugging:"
            Get-ChildItem -Force
            exit 1
          }
          cmake -S vst3 -B build -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -e
          cmake --build build --config Release --parallel 2

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake --build build --config Release -- /m:2

      - name: List build outputs (debug)
        if: always()
        run: |
          echo "Files in build (if any):"
          ls -R build || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spider-vst3-${{ matrix.os }}
          path: |
            build/**/*.vst3
            build/**/*.dll
            build/**/*.so
            build/**/*.dylib
          if-no-files-found: warn
