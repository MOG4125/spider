name: VST3-CI
on:
  push:
    branches: [ vst3 ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Python for fetch script
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install cmake

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure Git
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI Bot"

      - name: Run fetch-deps (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x vst3/extras/fetch-deps.sh
          vst3/extras/fetch-deps.sh

      - name: Run fetch-deps (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # On Windows runner Git Bash is available; run the script without chmod.
          vst3/extras/fetch-deps.sh

      - name: Configure CMake (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p build
          cd build
          cmake ../vst3

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path -Path build)) { New-Item -ItemType Directory -Path build | Out-Null }
          Set-Location build
          cmake ..\vst3

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd build
          cmake --build . --config Release -j 2

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-Location build
          cmake --build . --config Release -- /m:2

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spider-vst3-${{ matrix.os }}
          path: |
            build/**/*.vst3
            build/**/*.dll
            build/**/*.so
            build/**/*.dylib
          if-no-files-found: warn
